<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente de Orações</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #2c3e50;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 10px;
            width: 100%;
            max-width: 600px;
        }

        header h1 {
            color: #003366;
            margin: 0;
            font-variant: small-caps;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden; /* Para a imagem respeitar a borda arredondada */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 5px solid #003366;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        /* Estilo da Imagem */
        .card-img {
            width: 100%;
            height: 150px;
            object-fit: cover; /* Faz a imagem preencher o espaço sem distorcer */
            border-bottom: 1px solid #eee;
        }

        .card-content {
            padding: 20px;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card h3 {
            margin-top: 0;
            color: #003366;
            font-size: 1.2rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .btn-hoje { background-color: #003366; color: white; }
        .btn-ontem { background-color: #d4af37; color: white; }
        .btn-unico { background-color: #2c3e50; color: white; }

        button:hover {
            filter: brightness(1.2);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        /* Estilo para centralizar os anúncios do Adsterra */
        .ad-slot {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0;
            min-height: 50px; /* Garante o espaço mesmo antes de carregar */
        }
        
        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #7f8c8d;
            text-align: center;
        }
    </style>
</head>
<body>

<script>
    function buscar(titulo, periodo) {
        const data = new Date();
        if (periodo === 'ontem') data.setDate(data.getDate() - 1);
        const dia = String(data.getDate()).padStart(2, '0');
        const mes = String(data.getMonth() + 1).padStart(2, '0');
        const ano = data.getFullYear();
        const dataFormatada = `${dia}/${mes}/${ano}`;
        const termoBusca = `${titulo} ${dataFormatada}`;
        const urlYoutube = `https://www.youtube.com/results?search_query=${encodeURIComponent(termoBusca)}`;
        window.open(urlYoutube, '_blank');
    }
</script>
